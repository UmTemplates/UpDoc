name: Release to NuGet

on:
  push:
    tags:
      # UpDoc versions track the Umbraco version they target, so the first three
      # parts are the CMS version. The fourth is UpDoc's own build number on that
      # CMS, which is what allows more than one UpDoc release per Umbraco patch.
      #
      #   17.5.3      first UpDoc release targeting Umbraco 17.5.3
      #   17.5.3.1    a later UpDoc release, same CMS
      #   17.5.3-rc1  prerelease
      #
      # Note NuGet normalises a trailing zero, so 17.5.3.0 publishes as 17.5.3.
      # Start the fourth part at 1.
      - '[0-9]*.[0-9]*.[0-9]*'
      - '[0-9]*.[0-9]*.[0-9]*.[0-9]*'
      - '[0-9]*.[0-9]*.[0-9]*-*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Pack
        run: dotnet pack src/UpDoc/UpDoc.csproj -c Release -o ./artifacts /p:Version=${{ github.ref_name }}

      - name: NuGet Trusted Publishing Login
        id: nuget-login
        uses: nuget/login@v1
        with:
          user: dean.leigh

      - name: Push to NuGet
        run: dotnet nuget push ./artifacts/*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }}

      - name: Create GitHub Release
        run: |
          if [[ "${{ github.ref_name }}" == *-* ]]; then
            gh release create "${{ github.ref_name }}" --title "v${{ github.ref_name }}" --prerelease --generate-notes
          else
            gh release create "${{ github.ref_name }}" --title "v${{ github.ref_name }}" --generate-notes
          fi
        env:
          GH_TOKEN: ${{ github.token }}
